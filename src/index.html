<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Dead Internet Radio</title>
   <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="block-canvas"></canvas>

  <header id="deck" aria-live="off">
    <div class="player-center">
      <div class="player-titles">
        <span id="station-id">DEAD INTERNET RADIO</span>
      </div>
    </div>

    <div class="transport">
      <div class="speaker" aria-hidden="true"></div>
      <div class="wave-wrap">
        <canvas id="wave" width="760" height="80"></canvas>
        <span id="track-title"></span>
      </div>
      <span class="ctrl"><span class="led"></span><button id="btn-prev" class="abtn" title="Previous track">⏮</button></span>
      <span class="ctrl"><span class="led" id="led-play"></span><button id="btn-play" class="abtn" title="Play / Pause">▶</button></span>
      <span class="ctrl"><span class="led"></span><button id="btn-stop" class="abtn" title="Stop">⏹</button></span>
      <span class="ctrl"><span class="led"></span><button id="btn-next" class="abtn" title="Next track">⏭</button></span>
    </div>
  </header>

  <audio id="player" preload="auto"></audio>
  <audio id="voiceover-el" preload="auto"></audio>
  <script src="app.js"></script>
</body>
</html>
